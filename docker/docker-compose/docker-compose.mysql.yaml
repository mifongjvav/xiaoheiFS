name: xiaoheifs-mysql

services:
  xiaoheifs:
    build:
      context: ../..
      dockerfile: docker/build/Dockerfile
    image: xiaoheifs-backend:latest
    # Alpine variant:
    # image: xiaoheifs-backend:alpine
    container_name: xiaoheifs
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ADDR: ":8080"
      APP_API_BASE_URL: "http://localhost:8080"
      APP_JWT_SECRET: ""
      APP_PLUGIN_MASTER_KEY: ""
      APP_PLUGINS_DIR: "./backend/plugins"
      APP_DB_TYPE: mysql
      APP_DB_PATH: ""
      APP_DB_HOST: "mysql"
      APP_DB_PORT: "3306"
      APP_DB_NAME: "xiaoheifs"
      APP_DB_USER: "xiaoheifs"
      APP_DB_PASSWORD: "XiaoheiFS123$%^"
      APP_DB_OPTIONS: "charset=utf8mb4&parseTime=True&loc=Local"
    volumes:
      - xiaoheifs_data:/app/data
      - xiaoheifs_uploads:/app/uploads
    depends_on:
      - mysql
    networks:
      - xiaoheifs

  mysql:
    image: mysql:8.4
    container_name: xiaoheifs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 'XiaoheiFS123$%^'
      MYSQL_DATABASE: xiaoheifs
      MYSQL_USER: xiaoheifs
      MYSQL_PASSWORD: 'XiaoheiFS123$%^'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - xiaoheifs

volumes:
  xiaoheifs_data:
  xiaoheifs_uploads:
  mysql_data:

networks:
  xiaoheifs:
    name: xiaoheifs
