name: xiaoheifs-sqlite
# WARNING: SQLite is not recommended for production environments.

services:
  xiaoheifs:
    build:
      context: ../..
      dockerfile: docker/build/Dockerfile
    image: xiaoheifs-backend:latest
    # Alpine variant:
    # image: xiaoheifs-backend:alpine
    container_name: xiaoheifs
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ADDR: ":8080"
      APP_API_BASE_URL: "http://localhost:8080"
      APP_JWT_SECRET: ""
      APP_PLUGIN_MASTER_KEY: ""
      APP_PLUGINS_DIR: "./backend/plugins"
      APP_DB_TYPE: sqlite
      APP_DB_PATH: "./data/app.db"
      APP_DB_HOST: ""
      APP_DB_PORT: ""
      APP_DB_NAME: ""
      APP_DB_USER: ""
      APP_DB_PASSWORD: ""
      APP_DB_OPTIONS: ""
    volumes:
      - xiaoheifs_data:/app/data
      - xiaoheifs_uploads:/app/uploads
    networks:
      - xiaoheifs

volumes:
  xiaoheifs_data:
  xiaoheifs_uploads:

networks:
  xiaoheifs:
    name: xiaoheifs
